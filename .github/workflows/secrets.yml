name: Sec - Gitleaks (Reporte Detallado)
on:
  push: {branches: [main, develop]}
  pull_request: {branches: [main]}

env:
  # Elimina el warning molesto de Node.js 20
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0} # Escanea el historial completo

      # Ejecutamos Gitleaks puro en Docker, evitando bloqueos de licencia
      - name: Gitleaks Scan (Open Source)
        run: |
          docker run -v $(pwd):/src zricethezav/gitleaks:latest detect \
            --source="/src" \
            --report-format json \
            --report-path /src/gitleaks-report.json || true
        continue-on-error: true

      # Convertimos el JSON real al formato HTML
      - name: Generar Reporte HTML
        run: |
          python3 -c "
          import json, os
          try:
              with open('gitleaks-report.json', 'r') as f:
                  data = json.load(f)
          except Exception as e:
              print(f'No se encontró el reporte JSON o está vacío. {e}')
              data = []
          
          html = f'''
          <html><head><title>Reporte Gitleaks</title>
          <style>
            body {{ font-family: sans-serif; background: #f4f7f9; padding: 20px; }}
            h1 {{ color: #2c3e50; }}
            .card {{ background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #e74c3c; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }}
            .secret {{ color: #c0392b; font-family: monospace; background: #f9f9f9; padding: 2px 5px; border-radius: 3px; }}
            .meta {{ font-size: 0.85em; color: #7f8c8d; margin-top: 5px; }}
          </style></head>
          <body>
            <h1>Reporte de Seguridad: Gitleaks</h1>
            <p>Hallazgos encontrados: <strong>{len(data)}</strong></p>
          '''
          for item in data:
              html += f'''
              <div class='card'>
                <strong>Regla:</strong> {item.get('Description')}<br>
                <strong>Archivo:</strong> {item.get('File')}<br>
                <strong>Línea:</strong> {item.get('StartLine')}<br>
                <div class='meta'>Commit: {item.get('Commit')}</div>
                <p>Secreto detectado: <span class='secret'>{item.get('Match') or item.get('Secret') or 'Oculto por seguridad'}</span></p>
              </div>'''
          
          html += '</body></html>'
          with open('reporte-gitleaks.html', 'w') as f:
              f.write(html)
          "

      - name: Subir Reporte HTML
        uses: actions/upload-artifact@v4
        with:
          name: reporte-gitleaks-html
          path: reporte-gitleaks.html
